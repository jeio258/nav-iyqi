<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>后台管理 · 临渊羡鱼</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#f5ebe0">

    <link rel="stylesheet" href="https://s4.zstatic.net/ajax/libs/lxgw-wenkai-webfont/1.7.0/lxgwwenkai-regular.min.css" media="print" onload="this.media='all'">

    <style>
        :root {
            --font-family: "LXGW WenKai", "Inter", "Segoe UI", "Roboto", system-ui, -apple-system, sans-serif;
            --bg: #f5ebe0;
            --card-bg: rgba(255, 250, 245, 0.85);
            --card-bg-hover: rgba(255, 252, 248, 0.95);
            --text: #4d3a28;
            --text-secondary: #8b7355;
            --text-tertiary: #a8947e;
            --border: rgba(210, 190, 160, 0.5);
            --border-strong: rgba(190, 160, 130, 0.45);
            --accent: #c7a87b;
            --accent-soft: rgba(199, 168, 123, 0.15);
            --danger: #e05a4a;
            --danger-soft: rgba(224, 90, 74, 0.1);
            --success: #3b9d6e;
            --success-soft: rgba(59, 157, 110, 0.1);
            --input-bg: rgba(255, 255, 255, 0.55);
            --focus: #c49a6c;
            --focus-ring: rgba(196, 154, 108, 0.2);
            --shadow-sm: 0 2px 12px rgba(140, 100, 60, 0.06);
            --shadow-md: 0 6px 20px rgba(140, 100, 60, 0.1);
            --avatar-bg: rgba(235, 220, 200, 0.7);
        }

        [data-theme="dark"] {
            --bg: #1a1512;
            --card-bg: rgba(30, 26, 22, 0.85);
            --card-bg-hover: rgba(42, 36, 30, 0.95);
            --text: #e5d9cc;
            --text-secondary: #b7a48b;
            --text-tertiary: #8f7a65;
            --border: rgba(180, 150, 120, 0.22);
            --border-strong: rgba(180, 150, 120, 0.32);
            --accent: #d4b58b;
            --accent-soft: rgba(212, 181, 139, 0.12);
            --input-bg: rgba(50, 42, 35, 0.55);
            --focus: #d9a87a;
            --focus-ring: rgba(217, 168, 122, 0.18);
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.35);
            --avatar-bg: rgba(70, 60, 48, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
            transition: background-color 0.5s ease, color 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeIn 0.6s ease both;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 450;
            color: var(--text);
            margin-bottom: 0.4rem;
            letter-spacing: 0.5px;
        }

        .header p { color: var(--text-secondary); font-size: 0.9rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 主题切换 */
        .theme-toggle {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text);
            font-family: var(--font-family);
            z-index: 10;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        /* 面板 */
        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.5s 0.1s ease both;
            transition: all 0.3s ease;
        }

        .form-group { margin-bottom: 1.4rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: var(--font-family);
            background: var(--input-bg);
            color: var(--text);
            transition: all 0.25s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        .form-group input::placeholder { color: var(--text-tertiary); }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.7rem 1.6rem;
            border: none;
            border-radius: 100px;
            font-size: 0.9rem;
            font-family: var(--font-family);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            letter-spacing: 0.2px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
        }
        .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: var(--shadow-md); }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text);
        }
        .btn-secondary:hover { border-color: var(--accent); background: var(--accent-soft); }

        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { filter: brightness(1.1); }

        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { filter: brightness(1.1); }

        .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }
        .btn-xs { padding: 0.25rem 0.65rem; font-size: 0.72rem; border-radius: 8px; }

        /* 链接列表 */
        .link-list { list-style: none; }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1rem;
            margin-bottom: 0.6rem;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 14px;
            transition: all 0.25s ease;
            flex-wrap: wrap;
            gap: 0.7rem;
            animation: fadeIn 0.4s ease both;
        }

        .link-item:hover {
            border-color: var(--border-strong);
            background: var(--card-bg-hover);
            box-shadow: var(--shadow-sm);
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex: 1;
            min-width: 180px;
        }

        .link-avatar {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .link-item:hover .link-avatar { transform: scale(1.05); }

        .link-details h4 {
            font-weight: 500;
            margin-bottom: 0.15rem;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .link-details span {
            font-size: 0.78rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .link-actions { display: flex; gap: 0.35rem; }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }

        .modal {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 460px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-md);
        }

        .modal h3 { margin-bottom: 1.4rem; font-weight: 500; font-size: 1.2rem; }

        .modal-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }

        /* 提示 */
        .alert {
            padding: 0.7rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
            font-weight: 500;
        }

        .alert-error { background: var(--danger-soft); color: var(--danger); border: 1px solid var(--danger); }
        .alert-success { background: var(--success-soft); color: var(--success); border: 1px solid var(--success); }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .section-title h2 { font-weight: 500; font-size: 1.3rem; letter-spacing: 0.3px; }

        /* 徽章 */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.55rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .badge-active { background: var(--success-soft); color: var(--success); }
        .badge-inactive { background: var(--danger-soft); color: var(--danger); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 0.8rem;
            color: var(--text-tertiary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--accent); }

        /* 分隔线 */
        .sep {
            height: 1px;
            background: var(--border);
            margin: 1.8rem 0;
        }

        @media (max-width: 480px) {
            .container { padding: 0 0.3rem; }
            .panel { padding: 1.4rem; border-radius: 16px; }
            .link-item { flex-direction: column; align-items: flex-start; }
            .link-actions { width: 100%; justify-content: flex-end; }
            .modal { max-width: 100%; border-radius: 18px; padding: 1.5rem; }
            .btn { padding: 0.6rem 1.3rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel">深色</span>
    </button>

    <div class="container">
        <div class="header">
            <h1>⚙️ 后台管理</h1>
            <p>临渊羡鱼 · 导航链接管理</p>
        </div>

        <!-- 登录面板 -->
        <div class="panel" id="loginPanel">
            <h2 style="margin-bottom:1.4rem;font-weight:500;text-align:center">管理员登录</h2>
            <div class="alert alert-error" id="loginAlert"></div>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" id="loginBtn">登录</button>
            <a href="/" class="back-link">← 返回导航页</a>
        </div>

        <!-- 管理面板 -->
        <div class="panel" id="adminPanel" style="display: none;">
            <div class="alert alert-success" id="saveAlert"></div>

            <div class="section-title">
                <h2>🔗 链接管理</h2>
                <div style="display:flex;gap:0.4rem;">
                    <button class="btn btn-primary btn-sm" id="addLinkBtn">+ 添加</button>
                    <button class="btn btn-success btn-sm" id="saveToServerBtn">同步</button>
                </div>
            </div>

            <ul class="link-list" id="linkList">
                <li style="text-align:center;padding:2rem;color:var(--text-tertiary);">加载中...</li>
            </ul>

            <div class="sep"></div>

            <div class="section-title">
                <h2>⚙️ 站点设置</h2>
                <button class="btn btn-success btn-sm" id="saveSettingsBtn">保存设置</button>
            </div>
            <div class="alert alert-success" id="settingsAlert"></div>
            <div class="form-group">
                <label for="siteTitle">站点标题</label>
                <input type="text" id="siteTitle" placeholder="🌾 友邻聚落">
            </div>
            <div class="form-group">
                <label for="siteSubtitle">站点副标题</label>
                <input type="text" id="siteSubtitle" placeholder="临渊羡鱼 · 且行且歌">
            </div>
            <div class="form-group">
                <label for="siteStartDate">建站日期</label>
                <input type="text" id="siteStartDate" placeholder="2025-12-01 00:00:00">
            </div>

            <div style="text-align:center;margin-top:2rem;display:flex;gap:0.7rem;justify-content:center;flex-wrap:wrap;">
                <button class="btn btn-secondary btn-sm" id="refreshBtn">刷新</button>
                <button class="btn btn-secondary btn-sm" id="logoutBtn">退出</button>
                <a href="/" class="btn btn-secondary btn-sm">返回首页</a>
            </div>
        </div>
    </div>

    <!-- 添加/编辑链接模态框 -->
    <div class="modal-overlay" id="linkModal">
        <div class="modal">
            <h3 id="modalTitle">添加链接</h3>
            <input type="hidden" id="linkId">
            <div class="form-group">
                <label for="linkName">链接名称 *</label>
                <input type="text" id="linkName" placeholder="例如：临渊羡鱼博客" required>
            </div>
            <div class="form-group">
                <label for="linkUrl">链接地址 *</label>
                <input type="url" id="linkUrl" placeholder="https://blog.fnosi.top" required>
            </div>
            <div class="form-group">
                <label for="linkFallback">回退图标（文字或 emoji）</label>
                <input type="text" id="linkFallback" placeholder="例如：临 或 📁" maxlength="2">
            </div>
            <div class="form-group">
                <label for="linkStatus">状态</label>
                <select id="linkStatus">
                    <option value="active">启用</option>
                    <option value="inactive">禁用</option>
                </select>
            </div>
            <div class="alert alert-error" id="modalAlert"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="saveLinkBtn" style="flex:1;">保存</button>
                <button class="btn btn-secondary" id="cancelLinkBtn" style="flex:1;">取消</button>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>确认删除</h3>
            <p style="color:var(--text-secondary);margin:0.8rem 0;">确定要删除这个链接吗？此操作不可撤销。</p>
            <input type="hidden" id="deleteId">
            <div class="modal-actions">
                <button class="btn btn-danger" id="confirmDeleteBtn" style="flex:1;">确认删除</button>
                <button class="btn btn-secondary" id="cancelDeleteBtn" style="flex:1;">取消</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
