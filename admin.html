<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>后台管理 · 临渊羡鱼</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#f5ebe0">
    
    <link rel="stylesheet" href="https://s4.zstatic.net/ajax/libs/lxgw-wenkai-webfont/1.7.0/lxgwwenkai-regular.min.css" media="print" onload="this.media='all'">
    
    <style>
        /* ========== CSS 变量 - 与 index 完全统一 ========== */
        :root {
            --font-family: "LXGW WenKai", "Inter", "Segoe UI", "Roboto", system-ui, -apple-system, sans-serif;
            
            /* 浅色模式 */
            --bg: #f5ebe0;
            --card-bg: rgba(255, 250, 245, 0.85);
            --text: #4d3a28;
            --text-secondary: #8b7355;
            --border: rgba(230, 210, 180, 0.6);
            --accent: #c7a87b;
            --danger: #e74c3c;
            --success: #27ae60;
            --input-bg: rgba(255, 255, 255, 0.6);
            --focus: #c49a6c;
            --shadow-sm: 0 6px 16px rgba(140, 100, 60, 0.08);
        }

        /* 深色模式 - 与 index 完全统一 */
        [data-theme="dark"] {
            --bg: #1a1512;
            --card-bg: rgba(35, 30, 26, 0.85);
            --text: #e5d9cc;
            --text-secondary: #b7a48b;
            --border: rgba(180, 150, 120, 0.3);
            --accent: #d4b58b;
            --input-bg: rgba(50, 42, 35, 0.6);
            --focus: #d9a87a;
            --shadow-sm: 0 6px 16px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .theme-toggle {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text);
            font-family: var(--font-family);
            z-index: 10;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
        }

        .theme-toggle:hover {
            border-color: var(--accent);
        }

        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: var(--font-family);
            background: var(--input-bg);
            color: var(--text);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(199, 168, 123, 0.2);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 100px;
            font-size: 1rem;
            font-family: var(--font-family);
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            filter: brightness(1.1);
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-success:hover {
            filter: brightness(1.1);
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
        }

        .link-list {
            list-style: none;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            margin-bottom: 0.8rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.25s ease;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .link-item:hover {
            border-color: var(--accent);
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 200px;
        }

        .link-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(243, 231, 217, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        [data-theme="dark"] .link-avatar {
            background: rgba(70, 60, 48, 0.8);
        }

        .link-details h4 {
            font-weight: 500;
            margin-bottom: 0.2rem;
        }

        .link-details span {
            font-size: 0.8rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .link-actions {
            display: flex;
            gap: 0.5rem;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 {
            margin-bottom: 1.5rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .alert-success {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-title h2 {
            font-weight: 500;
            font-size: 1.5rem;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-active {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-inactive {
            background: #fbe9e7;
            color: #c62828;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 0.5rem;
            }
            .panel {
                padding: 1.5rem;
                border-radius: 20px;
            }
            .link-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .link-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel">深色</span>
    </button>

    <div class="container">
        <div class="header">
            <h1>⚙️ 后台管理</h1>
            <p style="color: var(--text-secondary);">临渊羡鱼 · 导航链接管理</p>
        </div>

        <!-- 登录面板 -->
        <div class="panel" id="loginPanel">
            <h2 style="margin-bottom: 1.5rem; font-weight: 500; text-align: center;">管理员登录</h2>
            <div class="alert alert-error" id="loginAlert"></div>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" id="loginBtn">🔐 登录</button>
            <a href="/" class="back-link">← 返回导航页</a>
        </div>

        <!-- 管理面板 -->
        <div class="panel" id="adminPanel" style="display: none;">
            <div class="alert alert-success" id="saveAlert"></div>
            <div class="section-title">
                <h2>🔗 链接管理</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-primary btn-sm" id="addLinkBtn">+ 添加</button>
                    <button class="btn btn-success btn-sm" id="saveToServerBtn">💾 同步</button>
                </div>
            </div>
            
            <ul class="link-list" id="linkList">
                <li style="text-align: center; padding: 2rem; color: var(--text-secondary);">加载中...</li>
            </ul>

            <!-- 站点设置 -->
            <div style="margin-top: 2.5rem;">
                <div class="section-title">
                    <h2>⚙️ 站点设置</h2>
                    <button class="btn btn-success btn-sm" id="saveSettingsBtn">💾 保存设置</button>
                </div>
                <div class="alert alert-success" id="settingsAlert"></div>
                <div class="form-group">
                    <label for="siteTitle">站点标题</label>
                    <input type="text" id="siteTitle" placeholder="临渊羡鱼 · 导航页" value="">
                </div>
                <div class="form-group">
                    <label for="siteSubtitle">站点副标题</label>
                    <input type="text" id="siteSubtitle" placeholder="临渊羡鱼 · 且行且歌" value="">
                </div>
                <div class="form-group">
                    <label for="siteStartDate">建站日期</label>
                    <input type="text" id="siteStartDate" placeholder="2025-12-01 00:00:00" value="">
                </div>
            </div>

            <div style="text-align: center; margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <button class="btn btn-secondary btn-sm" id="refreshBtn">🔄 刷新</button>
                <button class="btn btn-secondary btn-sm" id="logoutBtn">🚪 退出</button>
                <a href="/" class="btn btn-secondary btn-sm">🏠 返回首页</a>
            </div>
        </div>
    </div>

    <!-- 添加/编辑链接模态框 -->
    <div class="modal-overlay" id="linkModal">
        <div class="modal">
            <h3 id="modalTitle">添加链接</h3>
            <input type="hidden" id="linkId">
            <div class="form-group">
                <label for="linkName">链接名称 *</label>
                <input type="text" id="linkName" placeholder="例如：临渊羡鱼博客" required>
            </div>
            <div class="form-group">
                <label for="linkUrl">链接地址 *</label>
                <input type="url" id="linkUrl" placeholder="https://blog.fnosi.top" required>
            </div>
            <div class="form-group">
                <label for="linkFallback">回退图标 (文字或emoji)</label>
                <input type="text" id="linkFallback" placeholder="例如：临 或 📁" maxlength="2">
            </div>
            <div class="form-group">
                <label for="linkStatus">状态</label>
                <select id="linkStatus">
                    <option value="active">启用</option>
                    <option value="inactive">禁用</option>
                </select>
            </div>
            <div class="alert alert-error" id="modalAlert"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="saveLinkBtn" style="flex: 1;">💾 保存</button>
                <button class="btn btn-secondary" id="cancelLinkBtn" style="flex: 1;">取消</button>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>确认删除</h3>
            <p style="color: var(--text-secondary); margin: 1rem 0;">确定要删除这个链接吗？此操作不可撤销。</p>
            <input type="hidden" id="deleteId">
            <div class="modal-actions">
                <button class="btn btn-danger" id="confirmDeleteBtn" style="flex: 1;">🗑️ 确认删除</button>
                <button class="btn btn-secondary" id="cancelDeleteBtn" style="flex: 1;">取消</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
