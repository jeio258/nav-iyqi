<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
<title>临渊羡鱼 · 导航页</title>
<meta name="description" content="临渊羡鱼个人导航页面">
<meta name="theme-color" content="#f5ebe0">

<link rel="preconnect" href="https://s4.zstatic.net">
<link rel="preconnect" href="https://faviconsnap.com">
<link rel="dns-prefetch" href="https://v1.hitokoto.cn">

<link rel="stylesheet" href="https://s4.zstatic.net/ajax/libs/lxgw-wenkai-webfont/1.7.0/lxgwwenkai-regular.min.css" media="print" onload="this.media='all'">

<style>
/* ========== CSS 变量 ========== */
:root {
    --font-family: "LXGW WenKai", "Inter", "Segoe UI", "Roboto", system-ui, -apple-system, sans-serif;

    --bg: #f5ebe0;
    --card-bg: rgba(255, 250, 245, 0.82);
    --card-bg-solid: rgba(255, 250, 245, 0.95);
    --text: #4d3a28;
    --text-secondary: #8b7355;
    --text-tertiary: #a8947e;
    --border: rgba(210, 190, 160, 0.5);
    --border-strong: rgba(190, 160, 130, 0.45);
    --accent: #c7a87b;
    --accent-soft: rgba(199, 168, 123, 0.15);
    --accent-glow: rgba(199, 168, 123, 0.35);
    --focus: #c49a6c;
    --divider: rgba(180, 155, 125, 0.25);
    --avatar-bg: rgba(235, 220, 200, 0.7);
    --avatar-hover: #decdb2;
    --skeleton: rgba(255, 255, 255, 0.5);
    --shadow-sm: 0 2px 12px rgba(140, 100, 60, 0.06);
    --shadow-md: 0 6px 20px rgba(140, 100, 60, 0.1);
    --shadow-hover: 0 12px 32px -6px rgba(160, 110, 50, 0.18);
    --pill-hover-bg: rgba(255, 252, 245, 0.95);
    --pill-hover-text: #2f2418;
    --fallback-text: #5e4532;
    --overlay-light: rgba(255, 252, 248, 0.25);
    --overlay-dark: rgba(0, 0, 0, 0.30);
}

[data-theme="dark"] {
    --bg: #1a1512;
    --card-bg: rgba(30, 26, 22, 0.82);
    --card-bg-solid: rgba(30, 26, 22, 0.95);
    --text: #e5d9cc;
    --text-secondary: #b7a48b;
    --text-tertiary: #8f7a65;
    --border: rgba(180, 150, 120, 0.22);
    --border-strong: rgba(180, 150, 120, 0.32);
    --accent: #d4b58b;
    --accent-soft: rgba(212, 181, 139, 0.12);
    --accent-glow: rgba(212, 181, 139, 0.25);
    --focus: #d9a87a;
    --divider: rgba(180, 150, 120, 0.15);
    --avatar-bg: rgba(70, 60, 48, 0.7);
    --avatar-hover: #6b5a45;
    --skeleton: rgba(200, 180, 150, 0.12);
    --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.25);
    --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.35);
    --shadow-hover: 0 12px 32px -6px rgba(0, 0, 0, 0.45);
    --pill-hover-bg: rgba(50, 44, 36, 0.95);
    --pill-hover-text: #f0e4d5;
    --fallback-text: #d4c0a8;
    --overlay-light: rgba(0, 0, 0, 0.02);
    --overlay-dark: rgba(0, 0, 0, 0.35);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background-color: var(--bg);
    font-family: var(--font-family);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem;
    padding-top: max(2.5rem, env(safe-area-inset-top));
    padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
    transition: background-color 0.5s ease, color 0.5s ease;
    position: relative;
}

/* 背景层 */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    transition: background-image 1.2s ease-in-out, opacity 1.2s ease-in-out;
    opacity: 1;
}

body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    transition: background-color 0.5s ease;
    background-color: var(--overlay-light);
}

[data-theme="dark"] body::after {
    background-color: var(--overlay-dark);
}

/* 微妙的噪点纹理 */
body .texture {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
}

.page-header,
.links-container,
.footer-section { position: relative; z-index: 2; }

/* ========== 头部 ========== */
.page-header {
    text-align: center;
    margin-bottom: 2.2rem;
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.9rem;
}

.page-header h1 {
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 450;
    color: var(--text);
    letter-spacing: 0.5px;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    padding: 0.7rem 2rem;
    border-radius: 100px;
    border: 1px solid var(--border);
    margin: 0;
    box-shadow: var(--shadow-sm);
    transition: all 0.4s ease;
    animation: headerIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes headerIn {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
}

.subtitle-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    flex-wrap: wrap;
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.45rem 0.9rem 0.45rem 1.5rem;
    box-shadow: var(--shadow-sm);
    color: var(--text-secondary);
    font-size: 0.88rem;
    transition: all 0.4s ease;
    animation: headerIn 0.8s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
}

.subtitle-text {
    font-weight: 400;
    letter-spacing: 0.4px;
}

/* 装饰分隔线 */
.header-divider {
    width: 36px;
    height: 2px;
    border-radius: 1px;
    background: var(--divider);
    margin: 0.1rem 0;
}

/* 链接计数 */
.link-count {
    font-size: 0.78rem;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
    animation: headerIn 0.8s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
}

.theme-btn {
    background: var(--avatar-bg);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.35rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--text);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.25s ease;
    font-family: var(--font-family);
    line-height: 1.2;
    white-space: nowrap;
}

.theme-btn:hover {
    background: var(--pill-hover-bg);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
    transform: translateY(-1px);
}

/* ========== 链接列表 ========== */
.links-container {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    padding: 0 0.5rem;
}

.pill-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    color: var(--text);
    font-weight: 500;
    font-size: clamp(0.92rem, 2vw, 1.05rem);
    padding: clamp(0.75rem, 2vh, 0.95rem) clamp(1.5rem, 4vw, 2rem);
    border-radius: 100px;
    text-decoration: none;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    white-space: nowrap;
    letter-spacing: 0.3px;
    line-height: 1.3;
    cursor: pointer;
    width: 100%;
    min-height: 50px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
    user-select: none;
    opacity: 0;
    transform: translateY(16px);
    animation: linkIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.pill-link::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.3s ease;
    box-shadow: 0 0 24px 4px var(--accent-glow);
    pointer-events: none;
}

@keyframes linkIn {
    to { opacity: 1; transform: translateY(0); }
}

.pill-link:active { transform: scale(0.97); }

@media (hover: hover) {
    .pill-link:hover {
        background: var(--pill-hover-bg);
        border-color: var(--accent);
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
        color: var(--pill-hover-text);
    }
    .pill-link:hover::after { opacity: 0.6; }
}

.pill-link:focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 4px;
}

.link-avatar {
    width: clamp(28px, 5vw, 36px);
    height: clamp(28px, 5vw, 36px);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--avatar-bg);
    transition: all 0.25s ease;
}

.link-avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    border-radius: inherit;
}

.link-avatar .fallback-text {
    font-weight: 600;
    color: var(--fallback-text);
    font-size: clamp(0.82rem, 2vw, 1rem);
    line-height: 1;
}

@media (hover: hover) {
    .pill-link:hover .link-avatar {
        background: var(--avatar-hover);
        transform: scale(1.08);
    }
}

/* ========== 页脚 ========== */
.footer-section {
    margin-top: 2.5rem;
    width: 100%;
    max-width: 600px;
    text-align: center;
    position: relative;
    z-index: 2;
    animation: headerIn 0.8s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
}

.footer-card {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1rem 2rem;
    box-shadow: var(--shadow-sm);
}

#runtime {
    font-size: clamp(11px, 1.5vw, 13px);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 0.35rem;
}

#runtime .rt-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #409EFF;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.5); }
}

#runtime span {
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
}

#hitokoto-container {
    font-size: clamp(0.78rem, 1.4vw, 0.88rem);
    color: var(--text-secondary);
    line-height: 1.7;
    min-height: 2.5em;
    max-width: 420px;
}

#hitokoto-text {
    transition: opacity 0.5s ease;
}

#hitokoto-from {
    display: block;
    font-size: clamp(0.7rem, 1.2vw, 0.76rem);
    color: var(--text-tertiary);
    margin-top: 3px;
    font-style: italic;
}

.admin-link {
    margin-top: 0.25rem;
    font-size: 0.75rem;
    color: var(--text-tertiary);
    text-decoration: none;
    opacity: 0.4;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
}

.admin-link:hover {
    opacity: 0.8;
    color: var(--accent);
}

.loading-skeleton {
    background: linear-gradient(110deg, transparent 30%, var(--skeleton) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: shimmer 1.8s infinite;
    border-radius: 6px;
    display: inline-block;
    min-width: 60%;
    height: 1em;
}

@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* ========== 响应式 ========== */
@media (max-width: 768px) {
    body { padding: 2rem 0.8rem; padding-top: max(2rem, env(safe-area-inset-top)); padding-bottom: max(2rem, env(safe-area-inset-bottom)); }
    .links-container { gap: 0.7rem; max-width: 500px; }
    .page-header { margin-bottom: 1.8rem; }
    .footer-card { padding: 0.8rem 1.5rem; border-radius: 16px; }
}

@media (max-width: 480px) {
    body { padding: 1.2rem 0.5rem; padding-top: max(1.2rem, env(safe-area-inset-top)); padding-bottom: max(1.2rem, env(safe-area-inset-bottom)); }
    .links-container { gap: 0.6rem; max-width: 420px; }
    .pill-link {
        border-radius: 80px;
        border-width: 1px;
        gap: 0.5rem;
        min-height: 44px;
        padding: 0.6rem 1.2rem;
    }
    .page-header { margin-bottom: 1.4rem; }
    .page-header h1 { padding: 0.55rem 1.4rem; font-size: 1.35rem; }
    .footer-section { margin-top: 1.8rem; }
    .footer-card { padding: 0.7rem 1.2rem; }
    .link-avatar { border-radius: 10px; width: 28px; height: 28px; }
}
</style>
</head>
<body>
    <div class="texture"></div>

    <header class="page-header" role="banner">
        <h1>🌾 友邻聚落</h1>
        <div class="subtitle-container">
            <span class="subtitle-text">临渊羡鱼 · 且行且歌</span>
            <button class="theme-btn" id="themeToggleBtn" aria-label="切换深色/浅色模式" title="切换深浅模式">
                <span id="themeIcon">🌙</span>
                <span id="themeLabel">深色</span>
            </button>
        </div>
        <div class="header-divider"></div>
        <div class="link-count" id="linkCount">0 个友邻</div>
    </header>

    <main class="links-container" id="linksContainer" role="list" aria-label="友情链接列表">
        <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
            <div class="loading-skeleton" style="width: 100%; height: 50px; border-radius: 100px;"></div>
        </div>
    </main>

    <footer class="footer-section" role="contentinfo">
        <div class="footer-card">
            <div id="runtime">
                <span class="rt-dot"></span>
                已运行 <span aria-live="polite">0天 00:00:00</span>
            </div>
            <div id="hitokoto-container">
                <span id="hitokoto-text" aria-live="polite">
                    <span class="loading-skeleton" style="width: 80%;"></span>
                </span>
                <span id="hitokoto-from"></span>
            </div>
            <a href="/admin" class="admin-link">管理</a>
        </div>
    </footer>

<script>
(function() {
    const CONFIG = {
        startDate: '2025-12-01 00:00:00',
        settingsStorageKey: 'nav_settings',
        bgImages: [
            'https://t.alcy.cc/moez',
            'https://t.alcy.cc/moez?2',
            'https://t.alcy.cc/moez?3',
            'https://t.alcy.cc/moez?4',
            'https://t.alcy.cc/moez?5'
        ],
        bgRotateInterval: 12000,
        bgFadeDuration: 1200,
        hitokotoApi: 'https://v1.hitokoto.cn/?c=f&encode=json',
        hitokotoInterval: 10000,
        hitokotoTimeout: 5000,
        apiBase: '/api/links',
        fallbackHitokotos: [
            '🌱 学而时习之，不亦说乎。',
            '🌱 静以修身，俭以养德。',
            '🌱 千里之行，始于足下。',
            '🌱 博观而约取，厚积而薄发。',
            '🌱 路漫漫其修远兮，吾将上下而求索。'
        ],
        defaultLinks: [
            { name: '临渊羡鱼博客', url: 'https://blog.fnosi.top', fallback: '临' },
            { name: '临渊羡鱼图床', url: 'https://imge.fnosi.top', fallback: '图' },
            { name: '文件快递柜', url: 'https://file.fnosi.top', fallback: '📁' },
            { name: '飞牛NAS', url: 'https://fnos.fnosi.top', fallback: '🐮' },
            { name: '临渊羡鱼资源站', url: 'https://list.fnosi.top', fallback: '📦' },
            { name: '临渊羡鱼标签页', url: 'https://tab.fnosi.top', fallback: '🏷️' }
        ]
    };

    const body = document.body;
    const linksContainer = document.getElementById('linksContainer');
    const linkCount = document.getElementById('linkCount');
    const runtimeSpan = document.querySelector('#runtime span');
    const hitokotoText = document.getElementById('hitokoto-text');
    const hitokotoFrom = document.getElementById('hitokoto-from');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');

    // ========== 加载链接 ==========
    async function loadLinks() {
        try {
            const response = await fetch(CONFIG.apiBase);
            if (!response.ok) throw new Error('API 响应错误');
            const data = await response.json();
            if (data.links && data.links.length > 0) {
                const active = data.links.filter(l => l.status === 'active');
                renderLinks(active);
                return;
            }
        } catch (e) {
            console.warn('无法从 API 加载链接，使用默认链接:', e.message);
        }
        renderLinks(CONFIG.defaultLinks);
    }

    function renderLinks(links) {
        if (!links || links.length === 0) {
            linksContainer.innerHTML = '<div style="text-align:center;padding:2.5rem;color:var(--text-tertiary);animation:headerIn .6s ease both"><p style="font-size:2rem;margin-bottom:.5rem">📭</p><p>暂无链接</p></div>';
            if (linkCount) linkCount.textContent = '0 个友邻';
            return;
        }
        if (linkCount) linkCount.textContent = links.length + ' 个友邻';
        linksContainer.innerHTML = links.map((link, i) => `
            <a href="${link.url}" class="pill-link" target="_blank" rel="noopener noreferrer" role="listitem" title="${link.name}" style="animation-delay:${0.06 * i}s">
                <span class="link-avatar">
                    <img src="https://faviconsnap.com/api/favicon?url=${encodeURIComponent(link.url)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                    <span class="fallback-text" style="display:none;">${link.fallback || link.name.charAt(0)}</span>
                </span>
                <span>${link.name}</span>
            </a>
        `).join('');
    }

    // ========== 背景淡入淡出轮转 ==========
    const bgLayer = document.createElement('div');
    bgLayer.style.cssText = 'position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;background-attachment:fixed;transition:opacity 1.2s ease-in-out;opacity:0;pointer-events:none;';
    document.body.insertBefore(bgLayer, document.body.firstChild);

    let bgIndex = 0, bgActive = false;
    function rotateBackground() {
        if (!CONFIG.bgImages.length) return;
        const next = CONFIG.bgImages[bgIndex];
        if (!bgActive) {
            bgLayer.style.backgroundImage = `url('${next}')`;
            bgLayer.style.opacity = '1';
            bgActive = true;
        } else {
            const prev = bgLayer;
            const curr = bgLayer.cloneNode();
            curr.style.backgroundImage = `url('${next}')`;
            curr.style.opacity = '0';
            document.body.insertBefore(curr, document.body.firstChild);
            requestAnimationFrame(() => { curr.style.opacity = '1'; });
            setTimeout(() => { prev.remove(); }, 1300);
        }
        bgIndex = (bgIndex + 1) % CONFIG.bgImages.length;
    }
    rotateBackground();
    setInterval(rotateBackground, CONFIG.bgRotateInterval);

    // ========== 运行时间 ==========
    function getStartDate() {
        try {
            const s = localStorage.getItem(CONFIG.settingsStorageKey);
            if (s) { const p = JSON.parse(s); if (p.startDate) return p.startDate; }
        } catch(e) {}
        return CONFIG.startDate;
    }
    const startDate = new Date(getStartDate());

    function updateRuntime() {
        if (!runtimeSpan) return;
        const now = new Date();
        let diff = Math.floor((now - startDate) / 1000);
        if (diff < 0) diff = 0;
        const days = Math.floor(diff / 86400);
        diff %= 86400;
        const h = String(Math.floor(diff / 3600)).padStart(2, '0');
        diff %= 3600;
        const m = String(Math.floor(diff / 60)).padStart(2, '0');
        const s = String(diff % 60).padStart(2, '0');
        runtimeSpan.textContent = `${days}天 ${h}:${m}:${s}`;
    }
    updateRuntime();
    setInterval(updateRuntime, 1000);

    // ========== 一言 ==========
    let hitokotoTimer;
    function fetchHitokoto() {
        if (!hitokotoText) return;
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), CONFIG.hitokotoTimeout);
        fetch(CONFIG.hitokotoApi, { signal: ctrl.signal })
            .then(r => { clearTimeout(tid); if (!r.ok) throw new Error(''); return r.json(); })
            .then(d => {
                if (d && d.hitokoto) {
                    hitokotoText.style.opacity = '0';
                    setTimeout(() => {
                        hitokotoText.textContent = '「' + d.hitokoto + '」';
                        hitokotoFrom.textContent = d.from ? '—— ' + d.from : '';
                        hitokotoText.style.opacity = '1';
                    }, 400);
                } else throw new Error('');
            })
            .catch(() => {
                const fb = CONFIG.fallbackHitokotos;
                hitokotoText.style.opacity = '0';
                setTimeout(() => {
                    hitokotoText.textContent = fb[Math.floor(Math.random() * fb.length)];
                    hitokotoFrom.textContent = '';
                    hitokotoText.style.opacity = '1';
                }, 400);
            });
    }
    fetchHitokoto();
    hitokotoTimer = setInterval(fetchHitokoto, CONFIG.hitokotoInterval);

    // ========== 主题切换 ==========
    const THEME_KEY = 'theme';
    function applyTheme(theme) {
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            if (themeIcon) themeIcon.textContent = '☀️';
            if (themeLabel) themeLabel.textContent = '浅色';
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#1a1512');
        } else {
            document.documentElement.removeAttribute('data-theme');
            if (themeIcon) themeIcon.textContent = '🌙';
            if (themeLabel) themeLabel.textContent = '深色';
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#f5ebe0');
        }
        localStorage.setItem(THEME_KEY, theme);
    }

    const savedTheme = localStorage.getItem(THEME_KEY);
    applyTheme(savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

    themeToggleBtn?.addEventListener('click', () => {
        applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!localStorage.getItem(THEME_KEY)) applyTheme(e.matches ? 'dark' : 'light');
    });

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
        loadLinks();
        try {
            const s = localStorage.getItem(CONFIG.settingsStorageKey);
            if (s) {
                const p = JSON.parse(s);
                if (p.title) document.querySelector('.page-header h1').textContent = p.title;
                if (p.subtitle) document.querySelector('.subtitle-text').textContent = p.subtitle;
            }
        } catch(e) {}
    });

    window.addEventListener('beforeunload', () => { if (hitokotoTimer) clearInterval(hitokotoTimer); });
})();
</script>
</body>
</html>
